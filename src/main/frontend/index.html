<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stress Relief - Find Your Peace</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #cce5ff, #e6f7ff);
    }
    .welcome-message {
      text-align: center;
      padding: 40px 20px 20px;
      max-width: 600px;
      margin: 0 auto;
    }
    .welcome-message h1 {
      font-size: 32px;
      color: #0077cc;
      margin-bottom: 10px;
    }
    .welcome-message p {
      font-size: 16px;
      color: #333;
      line-height: 1.6;
    }
    .auth-section {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .auth-card {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 100%;
    }
    .tab-labels {
      display: flex;
      justify-content: space-around;
      margin-bottom: 10px;
    }
    .tab-label {
      cursor: pointer;
      padding: 10px;
      font-weight: 500;
      border-bottom: 2px solid transparent;
    }
    #tab-login:checked ~ .tab-labels label[for="tab-login"],
    #tab-register:checked ~ .tab-labels label[for="tab-register"] {
      border-color: #0077cc;
    }
    .tab-panel {
      display: none;
    }
    #tab-login:checked ~ .tab-content #login-panel,
    #tab-register:checked ~ .tab-content #register-panel {
      display: block;
    }
    .form-group {
      margin-bottom: 15px;
      text-align: left;
    }
    .form-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    .btn-primary {
      background-color: #0077cc;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
    }
    .btn-primary:hover {
      background-color: #005fa3;
    }
  </style>
</head>
<body>

  <div class="welcome-message">
    <h1>Welcome to <span style="color:#0077cc;">Stress Relief</span></h1>
    <p>Manage stress, share experiences, and find calmness together.</p>
  </div>

  <div class="auth-section">
    <div class="auth-card">
      <div class="tabs">
        <input type="radio" name="tab" id="tab-login" checked hidden>
        <input type="radio" name="tab" id="tab-register" hidden>

        <div class="tab-labels">
          <label for="tab-login" class="tab-label">Login</label>
          <label for="tab-register" class="tab-label">Register</label>
        </div>

        <div class="tab-content">
          <!-- Login Form -->
          <div class="tab-panel" id="login-panel">
            <form action="RegisterServlet" method="post">
              <input type="hidden" name="action" value="login">
              <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required>
              </div>
              <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
              </div>
              <button type="submit" class="btn-primary">Login</button>
            </form>
          </div>

          <!-- Register Form -->
          <div class="tab-panel" id="register-panel">
            <form action="RegisterServlet" method="post">
              <input type="hidden" name="action" value="register">
              <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required>
              </div>
              <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required>
              </div>
              <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
              </div>
              <button type="submit" class="btn-primary">Register</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
